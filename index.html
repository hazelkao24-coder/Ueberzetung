<div id="root"></div>

<style>
  :root {
    --paper: #FAF8F4;
    --card: #FFFFFF;
    --ink: #232B33;
    --ink-soft: #5A6570;
    --line: #E7E2D8;
    --primary: #2F6F6A;
    --primary-dk: #235651;
    --must: #B23A3A;
    --key: #C08A2E;
    --fall: #4A6FA5;
    --gold-bg: #FBF3DF;
  }

  * { box-sizing: border-box; }

  #root {
    font-family: -apple-system, "Segoe UI", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
    color: var(--ink);
    max-width: 720px;
    margin: 0 auto;
    padding: 8px 18px 48px;
    line-height: 1.6;
  }

  .top {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    flex-wrap: wrap;
    gap: 10px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--line);
  }
  .title { font-size: 20px; font-weight: 700; letter-spacing: .3px; }
  .subtitle { font-size: 13px; color: var(--ink-soft); margin-top: 2px; }

  .counts { font-size: 13px; color: var(--ink-soft); text-align: right; }
  .counts b { color: var(--primary-dk); font-size: 15px; }

  .filters { margin: 18px 0 8px; display: flex; flex-direction: column; gap: 10px; }
  .filter-row { display: flex; flex-wrap: wrap; gap: 7px; align-items: center; }
  .filter-label { font-size: 12px; color: var(--ink-soft); width: 56px; flex: none; }

  .chip {
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--ink-soft);
    border-radius: 999px;
    padding: 5px 13px;
    font-size: 13px;
    cursor: pointer;
    transition: all .15s ease;
    font-family: inherit;
  }
  .chip:hover { border-color: var(--primary); }
  .chip.on { background: var(--primary); border-color: var(--primary); color: #fff; }

  .chip.tier-must.on { background: var(--must); border-color: var(--must); }
  .chip.tier-key.on  { background: var(--key);  border-color: var(--key); }
  .chip.tier-fall.on { background: var(--fall); border-color: var(--fall); }

  .toggle-weak {
    margin-top: 4px;
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 13px; color: var(--ink-soft); cursor: pointer;
    user-select: none;
  }
  .switch {
    width: 38px; height: 22px; border-radius: 999px; background: var(--line);
    position: relative; transition: background .15s;
  }
  .switch.on { background: var(--primary); }
  .switch::after {
    content: ""; position: absolute; top: 2px; left: 2px;
    width: 18px; height: 18px; border-radius: 50%; background: #fff;
    transition: left .15s;
  }
  .switch.on::after { left: 18px; }

  .progress-wrap { margin: 16px 0 22px; }
  .bar { height: 8px; border-radius: 999px; background: var(--line); overflow: hidden; display: flex; }
  .bar .seg-master { background: var(--primary); }
  .bar .seg-learn  { background: var(--key); }
  .legend { font-size: 12px; color: var(--ink-soft); margin-top: 7px; display: flex; gap: 16px; flex-wrap: wrap; }
  .dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }

  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 30px 26px;
    box-shadow: 0 6px 24px -16px rgba(35,43,51,.35);
    min-height: 220px;
    display: flex;
    flex-direction: column;
  }
  .card-meta { display: flex; gap: 8px; align-items: center; margin-bottom: 18px; }
  .tag { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 6px; letter-spacing: .5px; }
  .tag.unit { background: #EEF1F0; color: var(--primary-dk); }
  .tag.tier-must { background: #F6E4E4; color: var(--must); }
  .tag.tier-key  { background: var(--gold-bg); color: #8A6212; }
  .tag.tier-fall { background: #E7EDF6; color: var(--fall); }
  .box-pips { margin-left: auto; font-size: 11px; color: var(--ink-soft); }
  .pip { display:inline-block; width:7px; height:7px; border-radius:50%; background:var(--line); margin-left:3px; vertical-align:middle; }
  .pip.fill { background: var(--primary); }

  .zh {
    font-size: 20px;
    line-height: 1.7;
    color: var(--ink);
    margin: 0 0 6px;
  }

  .de {
    font-family: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
    font-size: 18px;
    line-height: 1.75;
    color: var(--primary-dk);
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px dashed var(--line);
  }
  .de b { background: var(--gold-bg); padding: 0 3px; border-radius: 3px; font-weight: 700; color: #6e4f12; }

  .spacer { flex: 1; }

  .actions { margin-top: 24px; display: flex; gap: 12px; }
  .btn {
    flex: 1;
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    padding: 13px;
    border-radius: 12px;
    border: 1px solid transparent;
    cursor: pointer;
    transition: transform .08s ease, background .15s;
  }
  .btn:active { transform: translateY(1px); }
  .btn-reveal { background: var(--primary); color: #fff; }
  .btn-reveal:hover { background: var(--primary-dk); }
  .btn-miss { background: #fff; color: var(--must); border-color: #E6C9C9; }
  .btn-miss:hover { background: #FBF1F1; }
  .btn-got { background: #fff; color: var(--primary-dk); border-color: #CFE0DE; }
  .btn-got:hover { background: #F1F7F6; }

  .empty { text-align: center; padding: 50px 20px; color: var(--ink-soft); }
  .empty-emoji { font-size: 34px; margin-bottom: 12px; }

  .hint { font-size: 13px; color: var(--ink-soft); margin-top: 14px; text-align: center; }
  .reset { margin-top: 26px; text-align: center; }
  .reset button { background: none; border: none; color: var(--ink-soft); font-size: 12px; cursor: pointer; text-decoration: underline; font-family: inherit; }
</style>

<script>

  { id:"l3c", unit:"L3", tier:"key", zh:"在风能和太阳能领域，德国在技术上处于领先地位。", de:"Bei Wind- und Solarenergie **ist** Deutschland technologisch **führend**." },
  { id:"l3d", unit:"L3", tier:"fall", zh:"到2020年，德国国内生产总值的14%将来自这一新兴产业。", de:"Im Jahre 2020 werden **14 Prozent** des deutschen Bruttoinlandsprodukts auf das Konto der neuen Boombranche gehen." },
  { id:"l3e", unit:"L3", tier:"key", zh:"尽管美国和中国在奋起直追，但德国将能保持它的竞争优势。", de:"Amerika und China **holen** zwar **auf**, aber Deutschland wird seine Wettbewerbsposition halten können." },

  // ---------- L4 ----------
  { id:"l4a", unit:"L4", tier:"key", zh:"每年，成百上千万的德国人前往世界各地的海滩度假。", de:"Jährlich **zieht es** Millionen Deutsche **an die Strände** dieser Welt." },

  { id:"l4d", unit:"L4", tier:"key", zh:"两德统一后，莱比锡城的面貌发生了很大的变化。", de:"Nach der Wende haben **sich** große Veränderungen im Stadtbild Leipzigs **vollzogen**." },

  { id:"l5a", unit:"L5", tier:"key", zh:"海因记述了奥根叔叔一家为躲避纳粹迫害而藏身墓穴。", de:"In seinem Bericht **erzählt** Christoph Hein, **wie** sich Onkel Eugen und die Seinigen in einer Gruft versteckten, **um** sich vor der Verfolgung durch die Nazis zu schützen." },
  { id:"l5b", unit:"L5", tier:"key", zh:"与世隔绝的墓室非但没能成为生者的避难所，反而成了他们的葬身之地。", de:"**Statt** den Lebenden Zuflucht zu bieten, **wurde** die abgeschiedene Gruft deren Sterbeort." },
  { id:"l5c", unit:"L5", tier:"key", zh:"施特里特马特尔在其自传性散文《我的村子》中追忆了自己在乡村度过的多姿多彩的童年。", de:"In seinem autobiographischen Prosastück „Mein Dorf“ **erinnerte sich** Erwin Strittmatter **an** seine bunte Kindheit auf dem Land." },

  // ---------- L6 ----------
  { id:"l6a", unit:"L6", tier:"key", zh:"这位女主人公是一位寡妇，独自抚养九岁的儿子鲁道夫。", de:"Die Ich-Erzählerin ist eine Witwe und **zieht** allein ihren neunjährigen Sohn Rudolf **auf**." },
  { id:"l6b", unit:"L6", tier:"key", zh:"母亲深受这沉重打击的折磨，短时间内无法接受残酷的现实。", de:"Die Mutter **leidet** sehr **unter** dem schweren Schicksalsschlag und kann die harte Realität innerhalb kurzer Zeit nicht akzeptieren." },
  { id:"l6c", unit:"L6", tier:"key", zh:"这样，陌生城市的第一印象就深深地铭刻下来，虽然短暂，却长久。", de:"So **prägen sich** die ersten Eindrücke von den fremden Städten tief **ein**, zwar flüchtig, doch nachhaltig." },

  // ---------- L7 ----------
  { id:"l7a", unit:"L7", tier:"key", zh:"在德国的养老院里，有十多万老人没有得到足够的护理。", de:"Hunderttausende Bewohner von Seniorenheimen in Deutschland **werden** nicht ausreichend **gepflegt**." },
  { id:"l7b", unit:"L7", tier:"key", zh:"1901年，德国医生阿尔茨海默描述了第一个病例，这种病后来被称为阿尔茨海默症。", de:"Im Jahr 1901 **beschrieb** der deutsche Arzt Alzheimer den ersten Fall der Krankheit, welche später **als** Alzheimer-Krankheit bekannt wurde." },
  { id:"l7c", unit:"L7", tier:"key", zh:"其特征是认知功能不断恶化，通常伴有日常生活能力的减退。", de:"**Charakteristisch** ist eine zunehmende Verschlechterung der kognitiven Leistungsfähigkeit, die in der Regel mit einer Abnahme der täglichen Aktivitäten **einhergeht**." },
  { id:"l7d", unit:"L7", tier:"fall", zh:"65岁的老年人有10%会发病，到了80岁，其比例上升到40%。", de:"**Unter** den 65-Jährigen sind etwa **zehn Prozent** betroffen, **bei** den 80-Jährigen sind es bereits 40 Prozent." },

  // ---------- L8 ----------
  { id:"l8a", unit:"L8", tier:"must", zh:"土耳其总统居尔呼吁在德居住的土耳其人融入德国社会。", de:"Der türkische Staatspräsident Gül hat in Deutschland lebende Türken **aufgerufen**, Teil der deutschen Gesellschaft zu werden." },
  { id:"l8b", unit:"L8", tier:"must", zh:"对德国来说，制定开放和遴选的战略以赢得有专门技能的移民已刻不容缓。", de:"Es ist für Deutschland **höchste Zeit**, dass man Öffnungs- und Auswahlstrategien entwickelt und damit qualifizierte Zuwanderer gewinnt." },
  { id:"l8c", unit:"L8", tier:"must", zh:"默克尔也曾指出移民融合过程中存在的问题。", de:"Auch Bundeskanzlerin Merkel hat **auf** Probleme bei der Integration von Einwanderern **hingewiesen**." },
  { id:"l8d", unit:"L8", tier:"must", zh:"只有懂得语言，才能充分地理解一个国家。", de:"Man kann **sich** ein Land nur **erschließen**, wenn man die Sprache kann." }
];

const UNITS = ["L1","L2","L3","L4","L5","L6","L7","L8"];
const TIERS = [
  { key:"must", label:"必背 · 政治官方" },
  { key:"key",  label:"重点 · 科技文旅" },
  { key:"fall", label:"兜底 · 财经数据" }
];
const TIER_TAG = { must:"必背", key:"重点", fall:"兜底" };

let progress = {};               // id -> { box:1..5, seen:int }
let selUnits = new Set(UNITS);
let selTiers = new Set(["must","key","fall"]);
let weakOnly = false;
let current = null;
let revealed = false;

async function loadProgress() {
  try {
    const r = await window.storage.get("drill-progress");
    if (r && r.value) progress = JSON.parse(r.value);
  } catch (e) { progress = {}; }
}
async function saveProgress() {
  try { await window.storage.set("drill-progress", JSON.stringify(progress)); }
  catch (e) { /* keep going in-memory */ }
}
function boxOf(id){ return (progress[id] && progress[id].box) || 1; }

function pool() {
  return CARDS.filter(c => selUnits.has(c.unit) && selTiers.has(c.tier))
              .filter(c => !weakOnly || boxOf(c.id) < 5);
}

function pickNext() {
  const p = pool();
  if (!p.length) return null;
  // struggling cards first (low box), then least-seen, avoid repeating the same card twice in a row
  const sorted = [...p].sort((a,b) => {
    const ba = boxOf(a.id), bb = boxOf(b.id);
    if (ba !== bb) return ba - bb;
    const sa = (progress[a.id]&&progress[a.id].seen)||0;
    const sb = (progress[b.id]&&progress[b.id].seen)||0;
    return sa - sb;
  });
  const top = sorted.slice(0, Math.min(4, sorted.length));
  let next = top[Math.floor(Math.random()*top.length)];
  if (current && next.id === current.id && p.length > 1) {
    next = sorted.find(c => c.id !== current.id) || next;
  }
  return next;
}

function rate(got) {
  if (!current) return;
  const b = boxOf(current.id);
  const seen = ((progress[current.id]&&progress[current.id].seen)||0) + 1;
  progress[current.id] = { box: got ? Math.min(5, b+1) : 1, seen };
  saveProgress();
  current = pickNext();
  revealed = false;
  render();
}

function deHtml(s){
  return s.replace(/\*\*(.+?)\*\*/g, "<b>$1</b>");
}

function render() {
  const root = document.getElementById("root");
  const p = pool();
  const mastered = p.filter(c => boxOf(c.id) === 5).length;
  const learning = p.filter(c => boxOf(c.id) > 1 && boxOf(c.id) < 5).length;
  const fresh = p.length - mastered - learning;
  const total = p.length || 1;
  const mPct = (mastered/total)*100;
  const lPct = (learning/total)*100;

  let cardHtml;
  if (!current) {
    cardHtml = `<div class="card"><div class="empty">
      <div class="empty-emoji">🌱</div>
      <div>这一组没有句子可练了。</div>
      <div class="hint">换一个单元或层级，或关掉“只练薄弱”。</div>
    </div></div>`;
  } else {
    const c = current;
    const bx = boxOf(c.id);
    const pips = [1,2,3,4,5].map(i => `<span class="pip ${i<=bx?'fill':''}"></span>`).join("");
    const actions = revealed
      ? `<button class="btn btn-miss" onclick="rate(false)">还没记住</button>
         <button class="btn btn-got" onclick="rate(true)">记住了</button>`
      : `<button class="btn btn-reveal" onclick="reveal()">写完了，看德语</button>`;
    cardHtml = `<div class="card">
      <div class="card-meta">
        <span class="tag unit">${c.unit}</span>
        <span class="tag tier-${c.tier}">${TIER_TAG[c.tier]}</span>
        <span class="box-pips">熟练度 ${pips}</span>
      </div>
      <p class="zh">${c.zh}</p>
      ${revealed ? `<div class="de">${deHtml(c.de)}</div>` : ``}
      <div class="spacer"></div>
      <div class="actions">${actions}</div>
      ${!revealed ? `<div class="hint">先在脑子里或纸上把德语写出来，再翻面对照。</div>` : ``}
    </div>`;
  }

  root.innerHTML = `
    <div class="top">
      <div>
        <div class="title">中译德 · 提取练习</div>
        <div class="subtitle">看中文 → 写德语 → 翻面对照</div>
      </div>
      <div class="counts"><b>${mastered}</b> 已牢固 · ${learning} 巩固中 · ${fresh} 待开练</div>
    </div>

    <div class="filters">
      <div class="filter-row">
        <span class="filter-label">单元</span>
        ${UNITS.map(u => `<button class="chip ${selUnits.has(u)?'on':''}" onclick="toggleUnit('${u}')">${u}</button>`).join("")}
      </div>
      <div class="filter-row">
        <span class="filter-label">层级</span>
        ${TIERS.map(t => `<button class="chip tier-${t.key} ${selTiers.has(t.key)?'on':''}" onclick="toggleTier('${t.key}')">${t.label}</button>`).join("")}
      </div>
      <div class="toggle-weak" onclick="toggleWeak()">
        <span class="switch ${weakOnly?'on':''}"></span> 只练薄弱的句子
      </div>
    </div>

    <div class="progress-wrap">
      <div class="bar">
        <div class="seg-master" style="width:${mPct}%"></div>
        <div class="seg-learn" style="width:${lPct}%"></div>
      </div>
      <div class="legend">
        <span><span class="dot" style="background:var(--primary)"></span>已牢固</span>
        <span><span class="dot" style="background:var(--key)"></span>巩固中</span>
        <span><span class="dot" style="background:var(--line)"></span>待开练</span>
      </div>
    </div>

    ${cardHtml}

    <div class="reset"><button onclick="resetAll()">清空进度，重新开始</button></div>
  `;
}

function reveal(){ revealed = true; render(); }
function toggleUnit(u){ selUnits.has(u)?selUnits.delete(u):selUnits.add(u); if(!selUnits.size) selUnits.add(u); current=pickNext(); revealed=false; render(); }
function toggleTier(t){ selTiers.has(t)?selTiers.delete(t):selTiers.add(t); if(!selTiers.size) selTiers.add(t); current=pickNext(); revealed=false; render(); }
function toggleWeak(){ weakOnly=!weakOnly; current=pickNext(); revealed=false; render(); }
async function resetAll(){ progress={}; await saveProgress(); current=pickNext(); revealed=false; render(); }

(async function init(){
  await loadProgress();
  current = pickNext();
  render();
})();
</script>
